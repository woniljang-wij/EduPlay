<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <script>
      const checkParams = new URLSearchParams(window.location.search);

      const checkRoomCode = checkParams.get("room");

      const user = localStorage.getItem("user");

      if (!checkRoomCode && !user) {
        location.replace("../login.html");
      }
    </script>

    <title>Chơi Game</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/confetti.css" />
    <link rel="stylesheet" href="../css/play.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body
    class="h-screen overflow-hidden relative flex items-center justify-center p-6"
  >
    <!-- BACKGROUND -->
    <video autoplay muted loop playsinline class="bg-video">
      <source src="../assets/videos/bg.mp4" type="video/mp4" />
    </video>

    <!-- MAIN BOX -->
    <div
      class="main-shell-x10 w-full max-w-[1135px] h-fit scale-[0.92] origin-center rounded-[38px] shadow-[0_25px_80px_rgba(0,0,0,.35)] border border-white/40 p-4"
    >
      <!-- glow -->
      <div
        class="absolute -top-20 -left-20 w-60 h-60 bg-blue-400/20 blur-3xl rounded-full"
      ></div>
      <div
        class="absolute -bottom-20 -right-20 w-60 h-60 bg-purple-400/20 blur-3xl rounded-full"
      ></div>

      <div id="gameInfo" class="mb-2 game-info-card"></div>

      <div class="grid grid-cols-3 gap-6 items-start mt-6">
        <!-- MAP -->
        <div class="col-span-2 flex">
          <div
            id="board"
            class="relative w-full h-[495px] max-h-[70vh] mx-auto"
          >
            <video
              autoplay
              muted
              loop
              playsinline
              class="absolute inset-0 w-full h-full object-cover rounded-2xl shadow-lg pointer-events-none"
            >
              <source src="../assets/videos/map.mp4" type="video/mp4" />
            </video>

            <div
              id="cellLayer"
              class="absolute inset-0 w-full h-full pointer-events-none"
            ></div>
            <div
              id="playerLayer"
              class="absolute inset-0 w-full h-full pointer-events-none"
            ></div>
          </div>
        </div>

        <!-- SIDE PANEL -->
        <div class="flex flex-col gap-3 justify-between h-[495px]">
          <!-- DICE -->
          <div class="side-card">
            <div class="dice-wrapper flex justify-center mb-4">
              <div id="dice3D" class="dice3d">
                <div class="face front">
                  <span class="dot center red"></span>
                </div>
                <div class="face back">
                  <span class="dot tl"></span><span class="dot tr"></span>
                  <span class="dot bl"></span><span class="dot br"></span>
                  <span class="dot ml"></span><span class="dot mr"></span>
                </div>
                <div class="face right">
                  <span class="dot tl"></span><span class="dot center"></span
                  ><span class="dot br"></span>
                </div>
                <div class="face left">
                  <span class="dot tl red"></span
                  ><span class="dot tr red"></span>
                  <span class="dot bl red"></span
                  ><span class="dot br red"></span>
                </div>
                <div class="face top">
                  <span class="dot tl"></span><span class="dot tr"></span>
                  <span class="dot center"></span><span class="dot bl"></span
                  ><span class="dot br"></span>
                </div>
                <div class="face bottom">
                  <span class="dot tl"></span><span class="dot br"></span>
                </div>
              </div>
            </div>

            <button id="rollBtn" onclick="rollDice()" class="btn-roll">
              <span>🎲</span>
              <span>Tung xúc xắc</span>
            </button>
          </div>

          <!-- MUSIC -->
          <div class="side-card">
            <p class="mb-2 font-semibold">🎵 Nhạc nền:</p>

            <div class="flex gap-2 flex-wrap" id="musicList">
              <button
                class="music-btn music-1"
                data-src="../assets/sounds/bai1.mp3"
              >
                Bài 1
              </button>
              <button
                class="music-btn music-2"
                data-src="../assets/sounds/bai2.mp3"
              >
                Bài 2
              </button>
              <button
                class="music-btn music-3"
                data-src="../assets/sounds/bai3.mp3"
              >
                Bài 3
              </button>
              <button
                class="music-btn music-4"
                data-src="../assets/sounds/bai4.mp3"
              >
                Bài 4
              </button>
              <button
                class="music-btn music-5"
                data-src="../assets/sounds/bai5.mp3"
              >
                Bài 5
              </button>
            </div>

            <audio id="bgMusic" loop></audio>
          </div>

          <!-- ACTION -->
          <div class="side-card">
            <div class="actions-row">
              <button id="soundBtn" onclick="toggleSound()" class="btn-icon">
                🔊
              </button>

              <button
                id="fullscreenBtn"
                onclick="toggleFullscreen()"
                class="btn-main"
              >
                <span class="fs-icon">⛶</span>
                <span class="fs-text">Toàn màn hình</span>
              </button>
            </div>

            <button onclick="goHome()" class="btn-exit">← Thoát</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== JOIN PLAYER SCREEN ===== -->
    <div
      id="playerSetup"
      class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-md"
    >
      <div
        class="w-full max-w-md rounded-[38px] bg-white p-8 shadow-2xl animate-fadeIn"
      >
        <div class="text-center">
          <div class="text-5xl mb-4">🎮</div>

          <h2 id="setupGameTitle" class="text-3xl font-black text-gray-800">
            EduPlay
          </h2>

          <p class="text-gray-500 mt-2">Nhập tên cho từng người chơi</p>
        </div>

        <!-- PLAYERS -->
        <div id="setupInputs" class="mt-8 flex flex-col gap-4"></div>

        <!-- BUTTON -->
        <button
          id="startRoomBtn"
          class="mt-6 w-full h-14 rounded-2xl bg-gradient-to-r from-green-400 to-emerald-500 text-white font-black text-lg shadow-lg transition hover:scale-[1.02]"
        >
          ▶ BẮT ĐẦU CHƠI
        </button>
      </div>
    </div>

    <!-- VIDEO FULL -->
    <div id="victoryScreen" class="fixed inset-0 hidden z-[9999]">
      <div class="absolute inset-0 bg-black"></div>

      <video
        id="victoryVideo"
        class="absolute inset-0 w-full h-full object-cover"
        autoplay
        muted
        playsinline
      ></video>
    </div>

    <!-- ===================================== -->
    <!-- ULTRA VICTORY POPUP X10THINK -->
    <!-- ===================================== -->

    <div
      id="victoryPopup"
      class="fixed inset-0 hidden z-[10000] flex items-center justify-center overflow-hidden"
    >
      <!-- DARK BG -->
      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.08),rgba(0,0,0,0.88))] backdrop-blur-xl"
      ></div>

      <!-- PARTICLES -->
      <div class="victory-particles"></div>

      <!-- CARD -->
      <div id="victoryBox" class="victory-card-x10 relative">
        <!-- glow -->
        <div class="victory-glow glow-1"></div>
        <div class="victory-glow glow-2"></div>

        <!-- shine -->
        <div class="victory-shine"></div>

        <!-- crown -->
        <div class="victory-crown">👑</div>

        <!-- icon -->
        <div class="victory-avatar-wrap">
          <div class="avatar-ring"></div>

          <div id="winnerIcon" class="victory-avatar">🐸</div>
        </div>

        <!-- text -->
        <div class="victory-content">
          <div class="victory-subtitle">✦ EDUPLAY CHAMPION ✦</div>

          <h2 id="winnerText" class="victory-title">CHIẾN THẮNG!</h2>

          <p class="victory-desc">
            Bạn đã vượt qua mọi thử thách và trở thành người chiến thắng cuối
            cùng.
          </p>
        </div>

        <!-- actions -->
        <div class="victory-actions">
          <button onclick="goHome()" class="victory-btn btn-back">
            <span>←</span>
            <span>Trở về</span>
          </button>

          <button onclick="restartGame()" class="victory-btn btn-replay">
            <span>🎮</span>
            <span>Chơi lại</span>
          </button>
        </div>
      </div>
    </div>

    <!-- QUESTION -->
    <div
      id="questionPopup"
      class="fixed inset-0 hidden items-center justify-center z-[9999] bg-black/40 backdrop-blur"
    >
      <div class="w-[500px] max-w-[90%] rounded-3xl overflow-hidden shadow-2xl">
        <div class="bg-green-500 text-white p-4">❓ Câu hỏi</div>
        <div class="bg-white p-6">
          <p id="qTitle"></p>
          <div id="answers"></div>
        </div>
      </div>
    </div>

    <audio id="correctSound" src="../assets/sounds/correct.mp3"></audio>
    <audio id="wrongSound" src="../assets/sounds/wrong.mp3"></audio>
    <audio id="diceSound" src="../assets/sounds/dice.mp3"></audio>

    <script src="../js/games/toast.js" defer></script>
    <script src="../js/games/confetti.js"></script>
    <script src="../js/games/play.js" defer></script>
  </body>
</html>
