<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <script>
      const params = new URLSearchParams(window.location.search);

      const roomCode = params.get("room");

      const user = localStorage.getItem("user");

      if (!roomCode && !user) {
        location.replace("../login.html");
      }
    </script>

    <title>Chém hoa quả</title>

    <link rel="stylesheet" href="../css/confetti.css" />
    <link rel="stylesheet" href="../css/play_quizfruit.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body>
    <!-- VIDEO BG -->
    <video id="bgVideo" autoplay muted loop playsinline>
      <source src="../assets/videos/bgwood.mp4" type="video/mp4" />
    </video>

    <!-- GAME -->
    <div id="gameArea"></div>

    <!-- TIMER SVG GRADIENT -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <!-- NORMAL -->
        <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#00f5ff" />
        </linearGradient>

        <!-- LOW TIME -->
        <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#ff3355" />
        </linearGradient>
      </defs>
    </svg>

    <div id="endScene" class="end-scene hidden">
      <!-- VIDEO -->
      <video id="endVideo" class="end-video"></video>

      <!-- DARK FX -->
      <div class="end-dark"></div>

      <!-- PARTICLES -->
      <div class="end-particles"></div>

      <!-- LIGHT -->
      <div class="end-light"></div>

      <!-- RESULT UI -->
      <div id="endOverlay" class="end-overlay hidden">
        <!-- RANK -->
        <div id="rankHolder" class="rank-holder"></div>

        <!-- TITLE -->
        <h2 id="endTitle" class="end-title"></h2>

        <!-- SUB -->
        <div class="victory-sub">BATTLE RESULT</div>

        <!-- SCORE PANEL -->
        <div class="result-panel">
          <div class="result-row">
            <div class="result-icon">🎯</div>

            <div class="result-label">Chính xác</div>

            <div id="correctText" class="result-value">0/0</div>
          </div>

          <div class="result-row">
            <div class="result-icon">⭐</div>

            <div class="result-label">Điểm số</div>

            <div id="scoreText" class="result-value gold">0</div>
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="end-actions">
          <button class="ultra-btn replay-btn" onclick="replayGame()">
            <span>CHƠI LẠI</span>
          </button>

          <button class="ultra-btn exit-btn2" onclick="confirmExit()">
            <span>THOÁT</span>
          </button>
        </div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="game-controls">
      <button id="soundBtn">🔊</button>

      <button id="exitBtn" onclick="openExit()">THOÁT</button>
    </div>

    <!-- EXIT -->
    <div id="exitModal" class="exit-modal">
      <div class="exit-box">
        <h2>PAUSE</h2>

        <p>Bạn muốn thoát khỏi trận đấu?</p>

        <div class="exit-actions">
          <button onclick="confirmExit()" class="btn-exit">THOÁT</button>

          <button onclick="closeExit()" class="btn-cancel">TIẾP TỤC</button>
        </div>
      </div>
    </div>

    <!-- PLAYER SETUP -->
    <div id="playerSetup" class="fruit-setup hidden">
      <div class="fruit-setup-card">
        <div class="setup-glow"></div>

        <div class="setup-avatar">🙋</div>

        <div class="setup-title">Bạn tên gì nào? 🎮</div>

        <div class="setup-sub">Để thầy/cô biết bạn là ai</div>

        <div class="setup-room">
          <div class="setup-room-label">Bài tập của bạn 🎯</div>

          <div id="setupRoomTitle" class="setup-room-title">
            Quiz Chém Hoa Quả
          </div>
        </div>

        <div class="setup-input-wrap">
          <label>Tên của bạn</label>

          <div class="setup-input-box">
            <span>👤</span>

            <input
              id="playerNameInput"
              type="text"
              placeholder="VD: Nguyễn Văn A 😎"
              maxlength="20"
            />
          </div>
        </div>

        <div class="setup-actions">
          <button id="setupBackBtn" class="setup-btn back">← QUAY LẠI</button>

          <button id="setupStartBtn" class="setup-btn start">
            🎮 VÀO CHƠI!
          </button>
        </div>

        <div class="setup-note">
          🔑 Mã code do thầy/cô cung cấp • Bắt đầu bằng X-Team
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="../js/games/toast.js" defer></script>

    <script src="../js/games/confetti.js"></script>

    <script src="../js/games/play_quizfruit.js" defer></script>
  </body>
</html>
