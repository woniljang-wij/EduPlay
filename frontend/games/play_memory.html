<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>EduPlay - Memory</title>

    <link rel="stylesheet" href="../css/play_memory.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body>
    <!-- BACKGROUND -->
    <video id="bgVideo" autoplay muted loop>
      <source src="../assets/videos/bg.mp4" type="video/mp4" />
    </video>

    <!-- ===== TOP PANEL ===== -->
    <div class="top-panel">
      <div class="top-bar">
        <button class="btn-back" onclick="goBack()">← Quay lại</button>

        <h2 id="gameTitle">Loading...</h2>

        <div class="top-actions">
          <button class="btn-red" onclick="openGuess()">
            🔍 Giải mã tên ảnh
          </button>
          <button class="btn-red" onclick="toggleFullscreen()">
            ⛶ Toàn màn hình
          </button>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
        <span id="progressText">0%</span>
      </div>
    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

    <!-- ===== QUESTION MODAL ===== -->
    <div id="questionModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h3>❓ Câu hỏi</h3>

          <div class="timer-wrap">
            <svg class="timer-ring" width="50" height="50">
              <circle cx="25" cy="25" r="20" class="timer-bg" />
              <circle
                cx="25"
                cy="25"
                r="20"
                class="timer-progress"
                id="timerCircle"
              />
            </svg>
            <div class="timer-text" id="timerText">10</div>
          </div>
        </div>

        <p id="questionText"></p>

        <div id="answers"></div>

        <div class="modal-actions">
          <button onclick="closeModal()">❌ Hủy</button>
          <button onclick="submitAnswer()">✅ Trả lời</button>
        </div>
      </div>
    </div>

    <!-- ===== GUESS MODAL ===== -->
    <div id="guessModal" class="modal hidden">
      <div class="modal-box">
        <h3>🔍 Nhập tên ảnh</h3>

        <input id="guessInput" placeholder="Nhập đáp án..." />

        <div class="modal-actions">
          <button onclick="closeGuess()">❌ Hủy</button>
          <button onclick="submitGuess()">✅ Xác nhận</button>
        </div>
      </div>
    </div>

    <!-- ===== WIN ===== -->
    <div id="winBox" class="win hidden">
      <div class="win-card">
        <h2>🎉 Tên ảnh:</h2>
        <p id="finalAnswer"></p>
        <button onclick="location.reload()">↺ Chơi lại</button>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <!-- JS -->
    <script src="../js/games/toast.js"></script>
    <script src="../js/games/play_memory.js"></script>
  </body>
</html>
