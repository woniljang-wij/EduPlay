<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <title>Lịch sử giao bài</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/assign.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body class="assign-page">
    <div class="assign-page-wrap">
      <div class="assign-page-header">
        <div>
          <div class="assign-page-label">📋 EDUPLAY</div>

          <h1>Lịch sử giao bài</h1>

          <p>
            <span id="assignCount">0</span>
            bài tập đã tạo
          </p>

          <button
            id="clearExpiredBtn"
            class="clear-expired-btn hidden"
            onclick="clearExpiredAssignments()"
          >
            🗑 XÓA BÀI HẾT HẠN
          </button>
        </div>

        <button
          class="assign-back-btn"
          onclick="location.href = '../index.html'"
        >
          <i class="bi bi-arrow-left"></i>
        </button>
      </div>

      <div class="assign-table-header">
        <div class="assign-col stt">STT</div>

        <div class="assign-col remind">Tên gợi nhớ</div>

        <div class="assign-col lesson">Bài học</div>

        <div class="assign-col code">Mã / Link</div>

        <div class="assign-col status">Trạng thái</div>

        <div class="assign-col submit">Nộp</div>

        <div class="assign-col action">Thao tác</div>
      </div>

      <div id="assignmentsContainer" class="assignments-container"></div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="assignDetailOverlay" class="assign-overlay hidden">
      <div class="assign-detail-modal">
        <div class="assign-detail-top">
          <div>
            <h2 id="detailTitle">Chi tiết bài tập</h2>

            <p id="detailCode">Mã phòng</p>
          </div>

          <button class="detail-close" onclick="closeAssignDetail()">✕</button>
        </div>

        <div id="detailSubmitList" class="detail-submit-list"></div>
      </div>
    </div>

    <script src="../js/games/toast.js"></script>
    <script src="../js/games/assign.js"></script>
  </body>
</html>
