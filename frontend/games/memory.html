<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Game Lật Mảnh</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/memory.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body class="min-h-screen flex">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/videos/memory.mp4" type="video/mp4" />
    </video>
    <!-- SIDEBAR -->
    <aside
      class="w-72 bg-white/60 backdrop-blur-xl p-6 flex flex-col justify-between border-r border-white/30 shadow-xl"
    >
      <div>
        <h2 class="text-xl font-bold mb-6">🧩 Game Lật Mảnh</h2>

        <div class="space-y-3">
          <!-- 🏠 -->
          <button
            onclick="goIndex()"
            class="w-full text-left px-4 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 font-semibold"
          >
            🏠 Trang chủ
          </button>

          <!-- LIST -->
          <button
            id="btn-home"
            onclick="goHome()"
            class="w-full text-left px-4 py-3 rounded-xl font-semibold bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow"
          >
            📂 Bài của tôi
          </button>

          <!-- CREATE -->
          <button
            id="btn-create"
            onclick="goCreate()"
            class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-100"
          >
            ➕ Tạo bài mới
          </button>

          <!-- LIMIT -->
          <div class="px-4 py-3 bg-green-100 rounded-xl text-sm">
            Đã dùng 0/5 bài
          </div>

          <!-- UPGRADE -->
          <button
            class="w-full px-4 py-3 rounded-xl bg-red-500 text-white font-semibold"
          >
            ⭐ Nâng cấp Lẻ
          </button>

          <!-- BUG -->
          <button class="w-full px-4 py-3 rounded-xl bg-gray-100">
            🐛 Báo lỗi
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-6">
      <!-- ===== LIST PAGE ===== -->
      <div id="page-list">
        <div class="container-box">
          <div class="mb-6">
            <h1 class="text-2xl font-bold mb-1">🧩 Bài chơi của tôi</h1>
            <p class="text-gray-500 text-sm">
              Quản lý các game lật mảnh đã tạo
            </p>
          </div>

          <div id="memoryList" class="text-center py-20 text-gray-500">
            <div class="text-5xl mb-3">🧩</div>

            <p>Chưa có bài chơi nào</p>

            <button
              onclick="goCreate()"
              class="mt-5 px-6 py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-orange-400 to-orange-500 shadow hover:scale-105 transition"
            >
              ➕ Tạo bài đầu tiên
            </button>
          </div>
        </div>
      </div>

      <!-- ===== PAGE CREATE ===== -->
      <div id="page-create" class="hidden">
        <div class="container-box">
          <div class="header mb-6">
            <h1>🧩 Tạo Game Lật Mảnh</h1>
            <p>Tạo game đoán hình qua từng mảnh ghép</p>
          </div>

          <!-- TITLE -->
          <input
            id="title"
            class="w-full mb-4"
            placeholder="Tiêu đề bài chơi..."
          />

          <!-- ANSWER -->
          <input
            id="answer"
            class="w-full mb-4"
            placeholder="Đáp án (VD: Tháp Eiffel...)"
          />

          <!-- IMAGE SOURCE -->
          <div class="mb-6">
            <h3 class="font-semibold mb-2">📸 Nguồn ảnh</h3>

            <label
              ><input type="radio" name="imgType" value="upload" checked /> Tải
              ảnh lên</label
            >
            <label class="ml-4"
              ><input type="radio" name="imgType" value="url" /> Dùng
              link</label
            >

            <div id="uploadBox" class="mt-3">
              <input type="file" id="imageFile" />
            </div>
            <div id="previewBox" class="mt-4 hidden">
              <img id="previewImg" class="preview-img" />
            </div>
            <div id="urlBox" class="mt-3 hidden">
              <input
                id="imageUrl"
                class="w-full"
                placeholder="Nhập link ảnh..."
              />
            </div>
          </div>

          <!-- GRID -->
          <div class="mb-6">
            <h3 class="font-semibold mb-2">🔲 Cấu hình lưới</h3>

            <select id="grid" class="w-full">
              <option value="2">2x2 (4 ô)</option>
              <option value="3">3x3 (9 ô)</option>
              <option value="4">4x4 (16 ô)</option>
              <option value="5">5x5 (25 ô)</option>
              <option value="6">6x6 (36 ô)</option>
            </select>
          </div>

          <!-- TIME -->
          <div class="mb-6">
            <h3 class="font-semibold mb-2">⏱ Thời gian mỗi câu</h3>
            <input
              id="time"
              type="number"
              class="w-full"
              placeholder="VD: 10 giây"
            />
          </div>

          <!-- QUESTIONS -->
          <div class="mb-6">
            <h3 class="font-semibold mb-2">📚 Câu hỏi</h3>

            <button
              onclick="openQuestionManager()"
              class="border px-4 py-2 rounded-xl"
            >
              ✏️ Nhập câu hỏi
            </button>

            <div
              id="questionPreview"
              class="mt-4 bg-gray-50 p-4 rounded-xl text-gray-500"
            >
              Chưa có câu hỏi
            </div>
          </div>

          <!-- ACTION -->
          <div class="flex justify-end gap-3">
            <button onclick="goHome()" class="px-4 py-2 border rounded-xl">
              Hủy
            </button>

            <button onclick="saveMemoryGame()" class="btn-create">
              💾 Lưu game
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../js/games/toast.js"></script>
    <script src="../js/games/memory.js"></script>
  </body>
</html>
