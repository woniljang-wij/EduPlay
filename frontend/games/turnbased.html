<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Game Theo Lượt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/turnbased.css" />
  </head>

  <body class="bg-gradient-to-r from-green-400 to-emerald-500 min-h-screen flex">
    
    <!-- SIDEBAR -->
    <aside class="w-72 bg-white/80 backdrop-blur p-6 flex flex-col justify-between">
      <div>
        <h2 class="text-xl font-bold mb-6">Game Theo Lượt</h2>

        <div class="space-y-3">
          <!-- HOME -->
          <button id="btn-home" onclick="goHome()"
            class="w-full text-left px-4 py-3 rounded-xl font-semibold">
            🎲 Bài của tôi
          </button>

          <!-- CREATE -->
          <button id="btn-create" onclick="goCreate()"
            class="w-full text-left px-4 py-3 rounded-xl">
            ➕ Tạo bài mới
          </button>

          <div class="px-4 py-3 bg-green-100 rounded-xl text-sm">
            Đã dùng 0/5 bài
          </div>

          <button class="w-full px-4 py-3 rounded-xl bg-red-500 text-white font-semibold">
            ⭐ Nâng cấp Lẻ
          </button>

          <button class="w-full px-4 py-3 rounded-xl bg-gray-100">
            🐛 Báo lỗi
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-6">

      <!-- LIST PAGE -->
      <div id="page-list">
        <div class="bg-white rounded-3xl p-8 shadow-lg h-full">

          <div class="mb-6">
            <h1 class="text-2xl font-bold mb-2">🎲 Bài chơi của tôi</h1>
            <p class="text-gray-500">Quản lý các bài Game theo Lượt đã tạo</p>
          </div>

          <div class="border border-yellow-400 bg-yellow-50 text-yellow-700 px-4 py-3 rounded-xl mb-6">
            Ghim bài để luôn truy cập được kể cả khi hết hạn (0/5 đã ghim)
          </div>

          <div class="flex flex-col items-center justify-center h-[400px] bg-gray-50 rounded-2xl">
            <div class="text-6xl mb-4">🎲</div>
            <h3 class="text-lg font-semibold mb-2">Chưa có bài chơi nào</h3>
            <p class="text-gray-500 mb-4">Tạo bài đầu tiên để bắt đầu!</p>

            <button onclick="goCreate()"
              class="bg-green-500 text-white px-6 py-3 rounded-xl hover:bg-green-600">
              ➕ Tạo bài đầu tiên
            </button>
          </div>

        </div>
      </div>

      <!-- CREATE PAGE -->
      <div id="page-create" class="hidden">
        <div class="bg-white rounded-3xl p-8 shadow-lg h-full">

          <h1 class="text-2xl font-bold mb-4 text-emerald-600">
            🎲 Tạo Game Theo Lượt mới
          </h1>

          <!-- title -->
          <input class="w-full p-3 border rounded-xl mb-4" placeholder="Tiêu đề bài chơi">

          <!-- player count -->
          <div class="mb-4">
            <label class="text-sm text-gray-500">Số người chơi</label>
<!-- player count -->
<div class="mb-4">
  <select id="playerCount" class="w-full p-3 border rounded-xl mt-1">
    <option value="2">2 người chơi</option>
    <option value="3">3 người chơi</option>
    <option value="4">4 người chơi</option>
  </select>
</div>

<!-- players -->
<div id="playerInputs" class="flex gap-3 mb-4"></div>
          <!-- slider -->
          <div class="mb-6">
            <label class="block mb-2">
              Số chướng ngại vật mỗi đường: <b id="value">4</b>
            </label>
            <input type="range" min="1" max="10" value="4" id="slider" class="w-full">
          </div>

          <!-- music -->
          <div class="mb-6">
            <p class="mb-2">🎵 Nhạc nền mặc định</p>
<div class="flex gap-2" id="musicSelect">
  <button class="music-btn px-4 py-2 border rounded-full"
    data-src="../assets/sounds/bai1.mp3">Bài 1</button>

  <button class="music-btn px-4 py-2 border rounded-full"
  data-src="../assets/sounds/bai2.mp3">Bài 2</button>

  <button class="music-btn px-4 py-2 border rounded-full"
    data-src="../assets/sounds/bai3.mp3">Bài 3</button>
  
  <button class="music-btn px-4 py-2 border rounded-full"
    data-src="../assets/sounds/bai4.mp3">Bài 4</button>

  <button class="music-btn px-4 py-2 border rounded-full"
    data-src="../assets/sounds/bai5.mp3">Bài 5</button>
</div>
          </div>

          <!-- question -->
          <h3 class="font-semibold mb-2">Câu hỏi (0)</h3>

          <div class="flex gap-3 mb-4">
            <button class="bg-green-500 text-white px-4 py-2 rounded-xl">
              📚 Lấy từ Kho câu hỏi
            </button>
            <button class="border px-4 py-2 rounded-xl">
              ✏️ Nhập thủ công
            </button>
          </div>

          <div class="bg-gray-50 rounded-xl p-6 text-center text-gray-500 mb-6">
            Chưa có câu hỏi nào
          </div>

          <!-- action -->
          <div class="flex justify-end gap-3">
            <button onclick="goHome()" class="px-4 py-2 border rounded-xl">HỦY</button>
<button onclick="saveGame()"
  class="bg-green-500 text-white px-5 py-2 rounded-xl shadow">
  LƯU BÀI CHƠI
</button>
          </div>

        </div>
      </div>

    </main>

    <script src="../js/games/turnbased.js" defer></script>
  </body>
</html>
