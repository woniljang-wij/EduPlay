<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <script>
      const params = new URLSearchParams(window.location.search);

      const roomCode = params.get("room");

      const user = localStorage.getItem("user");

      if (!roomCode && !user) {
        location.replace("../login.html");
      }
    </script>

    <title>Chém Hoa Quả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/assign.css" />
    <link rel="stylesheet" href="../css/quizfruit.css" />
    <link rel="stylesheet" href="../css/toast.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen flex">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/videos/Quizfruit.mp4" type="video/mp4" />
    </video>

    <!-- SIDEBAR -->
    <aside
      class="w-72 bg-white/60 backdrop-blur-xl p-6 flex flex-col justify-between border-r border-white/30 shadow-xl"
    >
      <div>
        <h2 class="text-xl font-bold mb-6">🍉 Chém Hoa Quả</h2>

        <div class="space-y-3">
          <button
            onclick="goIndex()"
            class="w-full text-left px-4 py-3 rounded-xl transition-all duration-300 hover:scale-105 hover:bg-white/40"
          >
            🏠 Trang chủ
          </button>

          <button
            id="btn-home"
            onclick="goHome()"
            class="nav-btn w-full text-left px-4 py-3 rounded-xl font-semibold"
          >
            📚 Bài của tôi
          </button>

          <button
            id="btn-create"
            onclick="goCreateNew()"
            class="nav-btn w-full text-left px-4 py-3 rounded-xl"
          >
            ➕ Tạo bài mới
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-6">
      <!-- LIST -->
      <div id="page-list">
        <div class="container-box">
          <div class="mb-6">
            <h1 class="text-2xl font-bold mb-1">🍉 Bài học của tôi</h1>
            <p class="text-gray-500 text-sm">
              Quản lý các bài Chém Hoa Quả đã tạo
            </p>
          </div>
          <div id="gameList"></div>
        </div>
      </div>

      <!-- CREATE -->
      <div id="page-create" class="hidden">
        <div class="container-box">
          <h1 class="text-2xl font-bold mb-4 text-green-600">
            🍉 Tạo bài chém hoa quả
          </h1>

          <!-- TITLE -->
          <div class="mb-5">
            <label class="label-ui">
              <i class="bi bi-pencil-square"></i>
              Tiêu đề bài học
            </label>

            <input
              id="title"
              class="input-ui"
              placeholder="Nhập tên bài học..."
            />
          </div>

          <!-- TIME -->
          <div class="mb-5">
            <label class="label-ui">
              <i class="bi bi-stopwatch"></i>
              Thời gian mỗi câu
            </label>

            <input id="time" type="number" class="input-ui" value="25" />
          </div>

          <!-- SPEED -->
          <div class="mb-6">
            <label class="label-ui">
              <i class="bi bi-speedometer2"></i>
              Tốc độ game
            </label>

            <div class="flex gap-3 mt-2">
              <button class="speed-btn" data-speed="fast">🚀 Nhanh</button>
              <button class="speed-btn" data-speed="medium">
                ⚡ Trung bình
              </button>
              <button class="speed-btn" data-speed="slow">🐢 Chậm</button>
            </div>
          </div>

          <!-- QUESTION -->
          <h3 id="questionCount" class="section-title">
            <i class="bi bi-patch-question"></i>
            Câu hỏi (0)
          </h3>

          <div class="flex gap-3 mb-4">
            <button
              onclick="startAddQuestion()"
              id="btnAddFirst"
              class="btn-outline flex items-center gap-2"
            >
              <i class="bi bi-plus-circle"></i>
              Thêm câu hỏi
            </button>
          </div>

          <div id="questionList" class="space-y-4 mb-6">
            <p class="text-gray-400 text-center">Chưa có câu hỏi nào</p>
          </div>

          <!-- ACTION -->
          <div class="action-bar">
            <button onclick="goHome()" class="btn-secondary">
              <i class="bi bi-x-circle"></i> Hủy
            </button>

            <button onclick="saveGame()" class="btn-primary">
              <i class="bi bi-save"></i> Lưu bài
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- ===== ASSIGN MODAL ===== -->
    <div id="assignModal" class="assign-overlay hidden">
      <div class="assign-modal">
        <div class="assign-header">
          <div class="assign-icon">📋</div>

          <div>
            <h2>Giao bài tập</h2>
            <p>Tạo mã phòng cho học sinh tham gia</p>
          </div>
        </div>

        <div class="assign-game">
          <div class="assign-game-icon">🍉</div>

          <div>
            <div id="assignTitle" class="assign-game-title">QuizFruit</div>

            <div class="assign-game-type">Chém Hoa Quả</div>
          </div>
        </div>

        <div class="assign-group">
          <label>Tên gợi nhớ</label>

          <input id="assignName" type="text" placeholder="VD: Lớp 5A" />
        </div>

        <div class="assign-group">
          <label>Thời hạn mã</label>

          <div class="assign-time-list">
            <button class="assign-time active" data-day="1">1 ngày</button>

            <button class="assign-time" data-day="3">3 ngày</button>

            <button class="assign-time" data-day="7">7 ngày</button>
          </div>
        </div>

        <div class="assign-actions">
          <button onclick="closeAssign()" class="assign-cancel">HỦY</button>

          <button onclick="createAssign()" class="assign-create">
            🚀 TẠO BÀI TẬP
          </button>
        </div>
      </div>
    </div>

    <!-- ===== SUCCESS ===== -->
    <div id="assignSuccess" class="assign-overlay hidden">
      <div class="assign-success">
        <div class="success-icon">✅</div>

        <h2>Tạo bài thành công!</h2>

        <p>Học sinh có thể nhập mã hoặc quét QR để vào game</p>

        <div class="success-code-box">
          <div class="success-label">MÃ PHÒNG</div>

          <div id="roomCode" class="success-code">000000</div>
        </div>

        <div class="success-link-box">
          <input id="roomLink" readonly />

          <button onclick="copyRoomLink()">SAO CHÉP</button>
        </div>

        <div class="qr-wrap">
          <img id="qrImage" src="" />
        </div>

        <button onclick="closeAssignSuccess()" class="success-close">
          ĐÓNG
        </button>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script src="../js/games/assign.js"></script>
    <script src="../js/games/toast.js" defer></script>
    <script src="../js/games/quizfruit.js" defer></script>
  </body>
</html>
